schema_version: 2
song:
  id: kakes-synitheies
  title: Κακές Συνήθειες
  artist: Μίλτος Πασχαλίδης
  description: "Working SingNote chart based on the Greekrocker Kithara transcription, with comment-backed checkpoints for teacher review."
  key_signature: G major
  time_signature: 4/4
  tempo_bpm:
  tempo_notes: "Source uses G4 for Gsus4. Teacher-check points: Bm vs B/F# passing color, Am7/D7 color chords, and the final tag."
  strumming_pattern: "Start with a ringing folk-rock ballad feel. Use accented downstrokes at phrase starts, split the pattern where chords change mid-line, and keep the G/Gsus4 intro lighter."
sections:
  - id: intro
    title: Εισαγωγή
    lines:
      - id: intro-1
        lyrics: G Gsus4 G Gsus4
        chords: [G, Gsus4, G, Gsus4]
      - id: intro-2
        lyrics: G Am C D
        chords: [G, Am, C, D]
      - id: intro-3
        lyrics: G Am C D
        chords: [G, Am, C, D]
      - id: intro-4
        lyrics: G Gsus4 G Gsus4
        chords: [G, Gsus4, G, Gsus4]
  - id: verse-1
    title: Verse 1
    lines:
      - id: verse-1-1
        lyrics: Από παιδί θυμάμαι προσπαθώ, να κλέψω το γλυκό μέσ' απ' το βάζο
        chords: [G, Am, C, D, G]
      - id: verse-1-2
        lyrics: με ξύλινα σπαθιά να πολεμώ και μια ζωή στα πόδια να το βάζω
        chords: [G, Am, C, D, C, D]
      - id: verse-1-3
        lyrics: Μα ό,τι μας δένει στα παλιά είν' οι κακές συνήθειες
        chords: [Am, Em, D, G, D]
      - id: verse-1-riff-1
        lyrics: Riff
        chords: [D]
      - id: verse-1-4
        lyrics: το νιώθω τώρα καθαρά, πως είν' αργά γι' αλήθειες
        chords: [Am, C, D, G, D]
      - id: verse-1-riff-2
        lyrics: Riff
        chords: [D]
      - id: verse-1-5
        lyrics: πως είν' αργά γι' αλήθειες
        chords: [C, D, G]
  - id: chorus-1
    title: Chorus 1
    lines:
      - id: chorus-1-1
        lyrics: Όλη μου η ζωή συνενοχή και πώς γουστάρω
        chords: [C, D, G, Bm, Em]
      - id: chorus-1-2
        lyrics: τα πιο μεγάλα ψέματα, στα πιο αθώα βλέμματα
        chords: [Am, D, B7, Em]
      - id: chorus-1-3
        lyrics: όλη μου η ζωή συνενοχή και πώς γουστάρω
        chords: [C, D, G, Bm, Em]
      - id: chorus-1-4
        lyrics: κάτι απογεύματα, με καφέ και τσιγάρο
        chords: [Am, D, G]
  - id: interlude
    title: Interlude
    lines:
      - id: interlude-1
        lyrics: G Gsus4 G Gsus4
        chords: [G, Gsus4, G, Gsus4]
      - id: interlude-2
        lyrics: G Am C D
        chords: [G, Am, C, D]
      - id: interlude-3
        lyrics: G Am C D
        chords: [G, Am, C, D]
      - id: interlude-4
        lyrics: G Gsus4 G Gsus4
        chords: [G, Gsus4, G, Gsus4]
  - id: verse-2
    title: Verse 2
    lines:
      - id: verse-2-1
        lyrics: Από παιδί θυμάμαι προσπαθώ, στα λάθη μου φτηνά να τη γλιτώσω
        chords: [G, Am, C, D, G]
      - id: verse-2-2
        lyrics: μου 'μαθαν να φοβάμαι ό,τι αγαπώ και μια ζωή να φεύγω πριν να δώσω
        chords: [G, Am, C, D, C, D]
      - id: verse-2-3
        lyrics: Μα ό,τι μας δένει στα παλιά είν' οι κακές συνήθειες
        chords: [Am, Em, D, G, D]
      - id: verse-2-riff-1
        lyrics: Riff
        chords: [D]
      - id: verse-2-4
        lyrics: το νιώθω τώρα καθαρά, πως είν' αργά γι' αλήθειες
        chords: [Am, Em, D, G, D]
      - id: verse-2-riff-2
        lyrics: Riff
        chords: [D]
      - id: verse-2-5
        lyrics: πως είν' αργά γι' αλήθειες
        chords: [C, D, G]
  - id: chorus-2
    title: Chorus 2
    lines:
      - id: chorus-2-1
        lyrics: Όλη μου η ζωή συνενοχή και πώς γουστάρω
        chords: [C, D, G, Bm, Em]
      - id: chorus-2-2
        lyrics: τα πιο μεγάλα ψέματα, στα πιο αθώα βλέμματα
        chords: [Am, D, B7, Em]
      - id: chorus-2-3
        lyrics: όλη μου η ζωή συνενοχή και πώς γουστάρω
        chords: [C, D, G, Bm, Em]
      - id: chorus-2-4
        lyrics: κάτι απογεύματα, με καφέ και τσιγάρο
        chords: [Am, D, G]
  - id: outro
    title: Outro
    lines:
      - id: outro-1
        lyrics: G Gsus4 G Gsus4 G
        chords: [G, Gsus4, G, Gsus4, G]
annotations:
  - target_type: song
    target_id: kakes-synitheies
    text: "Base harmony is Greekrocker. Comments support Gsus4 intro, Am/Em/D movement, and B7 color; Bm and ending variants need teacher review."
